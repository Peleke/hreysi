version: 2

project_name: hreysi

before:
  hooks:
    - go mod tidy

builds:
  - id: hreysi
    main: .
    binary: hreysi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats:
      - tar.gz
    # Must match install.sh: hreysi_<version>_<os>_<arch>.tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - name: hreysi
    repository:
      owner: Peleke
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Peleke/hreysi"
    description: "Ambient buildlog capture — every commit, journaled."
    license: MIT
    commit_author:
      name: goreleaser-bot
      email: noreply@github.com
    install: |
      bin.install "hreysi"
    test: |
      system "#{bin}/hreysi", "version"

release:
  github:
    owner: Peleke
    name: hreysi
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
